const renderMath = (text) => {
    if (typeof window === "undefined" || !window.katex)
        return text;
    let html = text;
    try {
        const katexOptions = { throwOnError: false };
        html = html.replace(/\$\$([\s\S]*?)\$\$/g, (match, math) => {
            return window.katex.renderToString(math, { ...katexOptions, displayMode: true });
        });
        html = html.replace(/\$([\s\S]*?)\$/g, (match, math) => {
            return window.katex.renderToString(math, { ...katexOptions, displayMode: false });
        });
    }
    catch (e) {
        console.error(e);
    }
    return html;
};
function generateCSV(words) {
    const header = "# number,tag,word,meaning";
    const rows = words.map((w) => {
        return [w.id, w.tag, w.word, w.meaning]
            .map((v) => {
            const str = String(v || "");
            if (str.includes(",") ||
                str.includes('"') ||
                str.includes("\n") ||
                str.includes("\r")) {
                return `"${str.replace(/"/g, '""')}"`;
            }
            return str;
        })
            .join(",");
    });
    return [header, ...rows].join("\n");
}
function parseCSV(str) {
    const arr = [];
    let quote = false;
    let row = [];
    let col = "";
    for (let c = 0; c < str.length; c++) {
        let cc = str[c], nc = str[c + 1];
        if (cc === '"' && quote && nc === '"') {
            col += cc;
            ++c;
            continue;
        }
        if (cc === '"') {
            quote = !quote;
            continue;
        }
        if (cc === "," && !quote) {
            row.push(col);
            col = "";
            continue;
        }
        if (cc === "\n" && !quote) {
            row.push(col);
            arr.push(row);
            col = "";
            row = [];
            continue;
        }
        if (cc === "\r" && nc === "\n" && !quote) {
            row.push(col);
            arr.push(row);
            col = "";
            row = [];
            ++c;
            continue;
        }
        col += cc;
    }
    row.push(col);
    arr.push(row);
    return arr.filter((r) => r.length > 0 && r.some((c) => c.trim() !== ""));
}
function selectNextWords(candidateWords, count, userSettings, activeTags) {
    if (count <= 0 || candidateWords.length === 0)
        return [];
    const isSpecificTags = activeTags !== null && activeTags.length > 0;
    let filtered = [...candidateWords];
    if (isSpecificTags) {
        filtered = candidateWords.filter((w) => activeTags.includes(w.tag || ""));
        filtered.sort(() => Math.random() - 0.5);
        return filtered.slice(0, count);
    }
    const tagsMap = {};
    filtered.forEach((w) => {
        const t = w.tag || "";
        if (!tagsMap[t])
            tagsMap[t] = [];
        tagsMap[t].push(w);
    });
    const assignedWeights = userSettings.tagWeights || {};
    let totalAssigned = 0;
    Object.values(assignedWeights).forEach((v) => (totalAssigned += v));
    const remainingWeight = Math.max(0, 100 - totalAssigned);
    const unassignedTags = Object.keys(tagsMap).filter((t) => !(t in assignedWeights));
    const actualWeights = { ...assignedWeights };
    if (unassignedTags.length > 0) {
        const weightPerUnassigned = remainingWeight / unassignedTags.length;
        unassignedTags.forEach((t) => (actualWeights[t] = weightPerUnassigned));
    }
    let result = [];
    let availableTags = Object.keys(tagsMap);
    let currentWeights = availableTags.map((t) => actualWeights[t] || 0);
    for (let i = 0; i < count; i++) {
        const totalWeight = currentWeights.reduce((a, b) => a + b, 0);
        if (totalWeight <= 0) {
            const remaining = [];
            for (const tag of availableTags)
                remaining.push(...tagsMap[tag]);
            if (remaining.length === 0)
                break;
            const randIdx = Math.floor(Math.random() * remaining.length);
            const word = remaining[randIdx];
            result.push(word);
            const tagList = tagsMap[word.tag || ""];
            const tagIdx = tagList.findIndex((w) => w.id === word.id);
            if (tagIdx !== -1)
                tagList.splice(tagIdx, 1);
            if (tagList.length === 0) {
                const aId = availableTags.indexOf(word.tag || "");
                if (aId !== -1)
                    currentWeights[aId] = 0;
            }
            continue;
        }
        let r = Math.random() * totalWeight;
        let selectedTagIdx = 0;
        for (let j = 0; j < currentWeights.length; j++) {
            r -= currentWeights[j];
            if (r <= 0) {
                selectedTagIdx = j;
                break;
            }
        }
        const tag = availableTags[selectedTagIdx];
        const wordsInTag = tagsMap[tag];
        const randomWordIdx = Math.floor(Math.random() * wordsInTag.length);
        result.push(wordsInTag[randomWordIdx]);
        wordsInTag.splice(randomWordIdx, 1);
        if (wordsInTag.length === 0) {
            currentWeights[selectedTagIdx] = 0;
        }
    }
    return result;
}
const getTodayStr = (date) => {
    const d = date || new Date();
    const year = d.getFullYear();
    const month = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${year}-${month}-${day}`;
};
const calculateNextReview = (level, today, intervals) => {
    const date = new Date(today + "T00:00:00");
    let daysToAdd = intervals[Math.min(level - 1, intervals.length - 1)] ||
        intervals[intervals.length - 1] ||
        1;
    date.setDate(date.getDate() + daysToAdd);
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const day = String(date.getDate()).padStart(2, "0");
    return `${year}-${month}-${day}`;
};

            return;
        setIsSyncing(true);
        setSyncMessage("Downloading...");
        try {
            const res = await fetch(`https://api.github.com/gists/${gistId}`, {
                cache: "no-store",
                headers: {
                    Authorization: `Bearer ${githubToken}`,
                    Accept: "application/vnd.github.v3+json",
                },
            });
            if (!res.ok)
                throw new Error("Failed to fetch Gist");
            const data = await res.json();
            let fileContent = data.files["flashcard_sync.json"]?.content;
            if (!fileContent && data.files["flashcard_sync.json"]?.raw_url) {
                const rawRes = await fetch(data.files["flashcard_sync.json"].raw_url, {
                    cache: "no-store",
                });
                fileContent = await rawRes.text();
            }
            let cloudData = null;
            if (fileContent) {
                cloudData = JSON.parse(fileContent);
            }
            if (!cloudData) {
                alert("No sync data found in this Gist yet.");
                throw new Error("No data");
            }
            if (cloudData.words)
                setWords(cloudData.words);
            if (cloudData.srsState)
                setSrsState(cloudData.srsState);
            if (cloudData.userSettings)
                setUserSettings(cloudData.userSettings);
            if (cloudData.activityLog && !Array.isArray(cloudData.activityLog))
                setActivityLog(cloudData.activityLog);
            if (cloudData.session !== undefined)
                setSession(cloudData.session);
            setLastSyncTime(Date.now());
            setSyncMessage("Downloaded!");
        }
        catch (err) {
            console.error(err);
            setSyncMessage("Pull Failed");
        }
        setIsSyncing(false);
        setTimeout(() => setSyncMessage(""), 3000);
    };

        if (!confirmPush)
            return;

        setSyncMessage("Uploading...");

                words,
                srsState,
                userSettings,
                activityLog,
                session,

            const pushRes = await fetch(`https://api.github.com/gists/${gistId}`, {

                    Authorization: `Bearer ${githubToken}`,
                    Accept: "application/vnd.github.v3+json",

                body: JSON.stringify({

                throw new Error("Failed to update Gist");

            setSyncMessage("Uploaded!");

            queueBefore: session ? [...session.queue] : [],
            completedBefore: session ? session.completed : 0,
            direction: knewIt ? "right" : "left",

            nextReviewDate: null,
            status: "New",
            lastReviewDate: null,

            startDayLevel: 0,

        const newDailyCount = isSameDay ? (currentState.dailyCount || 0) + 1 : 1;
        const startDayLevel = isSameDay
            ? (currentState.startDayLevel ?? currentState.level)
            : currentState.level;
        let progressMultiplier = 1;
        if (newDailyCount === 2)
            progressMultiplier = 0.5;

            progressMultiplier = 0.2;
        let nextState;

                newLevel = startDayLevel + 1;

            const text = event.target?.result;
            const parsed = parseCSV(text);
            if (parsed.length > 0 &&
                String(parsed[0][0]).toLowerCase().includes("number")) {
                parsed.shift();
            }
            const newWords = [];
            parsed.forEach((row) => {
                if (row.length >= 4) {
                    const idStr = String(row[0]).trim();
                    const numId = idStr.startsWith("#")
                        ? parseInt(idStr.substring(1).trim())
                        : parseInt(idStr);
                    if (!isNaN(numId)) {
                        newWords.push({
                            id: numId,
                            tag: row[1].trim(),
                            word: row[2].trim(),
                            meaning: row[3].trim().replace(/\\n/g, "\n"),
                        });
                    }
                }
            });
            if (newWords.length > 0) {
                setWords((prev) => {
                    const merged = [...prev];
                    newWords.forEach((w) => {
                        const idx = merged.findIndex((mw) => mw.id === w.id);
                        if (idx !== -1)
                            merged[idx] = w;
                        else
                            merged.push(w);
                    });
                    return merged;
                });
                alert(`Successfully imported/updated ${newWords.length} words!`);

          {confirmModal && confirmModal.isOpen && (<div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-in fade-in duration-200">
              <div className={`${currentTheme.bgModal} rounded-3xl md:rounded-[32px] shadow-2xl w-full max-w-md p-6 md:p-8 relative flex flex-col border ${currentTheme.border} animate-in zoom-in-95 duration-200`}>
                <h2 className={`text-xl md:text-2xl font-black mb-4 ${confirmModal.isDanger ? "text-red-500" : currentTheme.textMain}`}>
                  {confirmModal.title}
                </h2>
                <div className={`text-sm md:text-base mb-8 ${currentTheme.textMain}`}>
                  {confirmModal.message}
                </div>
                <div className="flex gap-3 mt-auto w-full">
                  <button onClick={confirmModal.onCancel} className={`flex-1 py-3.5 ${currentTheme.bgSecondary} border ${currentTheme.border} ${currentTheme.textMain} hover:opacity-80 rounded-xl font-bold transition-colors`}>
                    Cancel
                  </button>
                  <button onClick={confirmModal.onConfirm} className={`flex-[1.5] py-3.5 ${confirmModal.isDanger ? "bg-red-500 hover:bg-red-600" : currentTheme.primaryBtn} text-white rounded-xl font-bold transition-colors shadow-lg`}>
                    {confirmModal.confirmText || "Confirm"}
                  </button>
                </div>
              </div>
            </div>)}
        </AnimatePresence>
      </div>);
    }
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
